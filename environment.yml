name: polartools-dev
channels:
  - conda-forge
  - aps-anl-tag
  - nsls2forge
  - nodefaults
dependencies:
  - python >=3.8, <=3.11
  - scipy
  - numpy
  - pandas
  - databroker
  - tiled
  - pip
  - sphinx
  - pytest
  - pytest-cov
  - databroker-pack
  - bluesky-live
  - flake8
  - lmfit
  - spec2nexus
  - versioneer
  - suitcase-csv
  - suitcase-json-metadata
  - suitcase-utils=0.5.3
  - ipython
  - numpydoc
  - pyresttable
  - area-detector-handlers
  - dask
  - hdf5plugin
  - apstools>=1.6.0
  - xraydb
  - scikit-image
  - pims>=0.6.1
  - imageio
  - h5py
  - pip:
    - sphinx-rtd-theme
    - super-state-machine
    - sphinx-copybutton
