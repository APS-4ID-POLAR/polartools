name: polartools-dev
channels:
  - conda-forge
  - aps-anl-tag
  - nsls2forge
  - nodefaults
dependencies:
  # Python interpreter; package + dev/docs deps are installed via pip from
  # pyproject.toml below. Keep heavy native libs (Qt, HDF5 plugins, dask) on
  # conda where pre-built wheels are less reliable.
  - python >=3.10,<3.13
  - pip
  - hdf5plugin
  - pyqt
  - suitcase-utils=0.5.3  # pinned to match older databroker-pack output
  - pip:
      - -e .[dev,docs]
