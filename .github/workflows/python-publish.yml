name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history for version

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publisher must be configured at:
    #   https://pypi.org/manage/project/polartools/settings/publishing/
    # with workflow `python-publish.yml` and environment `pypi`.
    environment:
      name: pypi
      url: https://pypi.org/p/polartools
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
