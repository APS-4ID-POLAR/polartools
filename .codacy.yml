# Codacy configuration. Tames noise from a small scientific package:
#   - tests have their own conventions and trip docstring/complexity rules
#   - vendored upstream code (_larch, _pyrixs) shouldn't be re-linted
#   - the version file is generated by hatch-vcs
#   - docs/conf.py and docs build artefacts aren't application code
# To further trim noise, disable the "Code Style", "Documentation", and
# "Code Complexity" categories for the Python tools in the Codacy web UI;
# Ruff (run in CI) covers style.
exclude_paths:
  - "polartools/tests/**"
  - "polartools/_version.py"
  - "polartools/_larch.py"
  - "polartools/_pyrixs.py"
  - "docs/**"
